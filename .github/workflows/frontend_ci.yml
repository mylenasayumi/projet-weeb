name: Frontend CI (Lint, Test with Coverage and Build Check)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Run Unit Tests with Coverage (Vitest)
        run: npx vitest run --coverage
        env:
            CI: "true"

      - name: Verify Production Build
        run: npm run build
